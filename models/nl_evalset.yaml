  - name: net_revenue_allowed_for_finance
    question: "what is net revenue"
    category: governance
    role: finance
    expect_metrics: [net_revenue]
    control: "SELECT (SELECT sum(quantity*unit_price) FROM order_items)-(SELECT sum(refund_amount) FROM refunds)"

