# NL evaluation set. Labeled questions mined from how people actually ask,
# stratified by category and including governance probes. Each case is graded on
# three axes:
#   - semantic match : grounding picks the right metric(s) + dimension(s)
#   - execution      : the governed query runs without error
#   - result match   : the number(s) equal a hand-written control query
# Governance probes assert an unauthorized metric is REFUSED, not answered.
#
# `control` is the source of truth for the number — never a hardcoded value — so
# the set stays correct as the seed data evolves. Cases that require real LLM
# grounding (multi-metric, time-grain windows, free-text filters) are marked
# `needs_llm: true` and excluded from the offline CI gate.

cases:
  # ============================================================= simple
  - name: total_revenue_overall
    question: "what is total revenue"
    category: simple
    expect_metrics: [total_revenue]
    control: "SELECT sum(quantity*unit_price) FROM order_items"

  - name: total_revenue_sales_phrasing
    question: "show me total sales"
    category: simple
    expect_metrics: [total_revenue]
    control: "SELECT sum(quantity*unit_price) FROM order_items"

  - name: total_revenue_topline_phrasing
    question: "what's our gross revenue"
    category: simple
    expect_metrics: [total_revenue]
    control: "SELECT sum(quantity*unit_price) FROM order_items"

  - name: units_sold_overall
    question: "how many units sold"
    category: simple
    expect_metrics: [units_sold]
    control: "SELECT sum(quantity) FROM order_items"

  - name: units_sold_quantity_phrasing
    question: "total quantity sold"
    category: simple
    expect_metrics: [units_sold]
    control: "SELECT sum(quantity) FROM order_items"

  - name: order_count_overall
    question: "number of orders"
    category: simple
    expect_metrics: [order_count]
    control: "SELECT count(DISTINCT order_id) FROM orders"

  - name: refund_total_overall
    question: "total refunds"
    category: simple
    expect_metrics: [refund_total]
    control: "SELECT sum(refund_amount) FROM refunds"

  - name: refund_total_returns_phrasing
    question: "how much in returns"
