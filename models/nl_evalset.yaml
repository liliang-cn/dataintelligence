  # ============================================================= ratio
  - name: aov_overall
    question: "average order value"
    category: ratio
    expect_metrics: [avg_order_value]
    control: "SELECT (SELECT sum(quantity*unit_price) FROM order_items)::numeric / nullif((SELECT count(DISTINCT order_id) FROM orders),0)"

  - name: aov_acronym_phrasing
    question: "what is our aov"
    category: ratio
    expect_metrics: [avg_order_value]
    control: "SELECT (SELECT sum(quantity*unit_price) FROM order_items)::numeric / nullif((SELECT count(DISTINCT order_id) FROM orders),0)"

  # ================================================ grouped: total_revenue
  - name: revenue_by_region
    question: "revenue by store region"
    category: grouped
    expect_metrics: [total_revenue]
    expect_dims: [store_region]
    control: |
      SELECT s.region, sum(oi.quantity*oi.unit_price)
      FROM order_items oi JOIN orders o ON oi.order_id=o.order_id
      JOIN stores s ON o.store_id=s.store_id GROUP BY s.region

  - name: revenue_by_store_type
    question: "revenue by store type"
    category: grouped
    expect_metrics: [total_revenue]
    expect_dims: [store_type]
    control: |
      SELECT s.store_type, sum(oi.quantity*oi.unit_price)
      FROM order_items oi JOIN orders o ON oi.order_id=o.order_id
      JOIN stores s ON o.store_id=s.store_id GROUP BY s.store_type

  - name: revenue_by_category
    question: "revenue by product category"
    category: grouped
    expect_metrics: [total_revenue]
    expect_dims: [product_category]
    control: |
      SELECT p.category, sum(oi.quantity*oi.unit_price)
      FROM order_items oi JOIN products p ON oi.product_id=p.product_id
      GROUP BY p.category

  - name: revenue_by_brand
    question: "revenue by product brand"
