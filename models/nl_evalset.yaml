  - name: net_revenue_refused_for_analyst
    question: "what is net revenue"
    category: governance
    role: analyst
    expect_metrics: [net_revenue]
    expect_refused: true

  - name: net_revenue_refused_for_manager
    question: "what is net revenue"
    category: governance
    role: manager
    expect_metrics: [net_revenue]
