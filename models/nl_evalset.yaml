    control: |
      SELECT o.status, count(DISTINCT o.order_id)
      FROM orders o GROUP BY o.status

  # ================================================ grouped: ratio (AOV)
  - name: aov_by_region
    question: "average order value by store region"
    category: ratio
    expect_metrics: [avg_order_value]
    expect_dims: [store_region]
    # AOV = total_revenue / order_count, each aggregated to region grain in its
    # own CTE then joined — order_count counts ALL orders, not only those with
    # line items (mirrors the layer's aggregate-then-join).
    control: |
      WITH rev AS (
        SELECT s.region, sum(oi.quantity*oi.unit_price) AS s
        FROM order_items oi JOIN orders o ON oi.order_id=o.order_id
        JOIN stores s ON o.store_id=s.store_id GROUP BY s.region),
      oc AS (
        SELECT s.region, count(DISTINCT o.order_id) AS c
        FROM orders o JOIN stores s ON o.store_id=s.store_id GROUP BY s.region)
      SELECT rev.region, rev.s::numeric / nullif(oc.c,0)
      FROM rev JOIN oc ON rev.region=oc.region

  - name: aov_by_segment
    question: "average order value by customer segment"
    category: ratio
    expect_metrics: [avg_order_value]
    expect_dims: [customer_segment]
    control: |
      WITH rev AS (
        SELECT c.segment, sum(oi.quantity*oi.unit_price) AS s
        FROM order_items oi JOIN orders o ON oi.order_id=o.order_id
        JOIN customers c ON o.customer_id=c.customer_id GROUP BY c.segment),
      oc AS (
        SELECT c.segment, count(DISTINCT o.order_id) AS c
        FROM orders o JOIN customers c ON o.customer_id=c.customer_id GROUP BY c.segment)
      SELECT rev.segment, rev.s::numeric / nullif(oc.c,0)
      FROM rev JOIN oc ON rev.segment=oc.segment

